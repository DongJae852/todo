name: Firebase Daily Backup


on:
  schedule:
    # 매일 KST 03:00 = UTC 18:00 (전날)
    - cron: '0 18 * * *'→ Runs at 18:00

  workflow_dispatch:


permissions:
  contents: write


jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'


      - name: Install Python deps
        run: pip install --quiet firebase-admin


      - name: Compute date (KST)
        id: date
        run: echo "kst=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"


      - name: Dump Firestore to JSON
